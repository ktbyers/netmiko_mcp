---
name: Netmiko MCP Testing

on: [push, pull_request]

env:
  FORCE_COLOR: 1

jobs:
  lint:
    name: "Lint & Type Check (Python 3.13)"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv and Python 3.13
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff format check
        run: uv run --frozen ruff format --check .

      - name: Run ruff lint check
        run: uv run --frozen ruff check .

      - name: Run mypy
        run: uv run --frozen mypy src tests

      - name: Run bandit security scan
        run: uv run --frozen bandit -r src/

      - name: Run pip-audit dependency scan
        run: >
          uv run --frozen pip-audit
          --ignore-vuln CVE-2026-44405
        # CVE-2026-44405: paramiko 4.0.0 allows SHA-1. This is intentional —
        # paramiko 5.x removed SHA-1 support which breaks connectivity to legacy
        # network devices. netmiko constrains paramiko<5.0 for the same reason.

  unit-tests:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run --frozen pytest -v --cov=netmiko_mcp --cov-report=term-missing --cov-fail-under=98
        if: matrix.python-version == '3.13'

      - name: Run pytest (no coverage)
        run: uv run --frozen pytest -v
        if: matrix.python-version != '3.13'
