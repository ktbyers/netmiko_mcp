---
name: Netmiko MCP Testing
on: [push, pull_request]
env:
  FORCE_COLOR: 1

jobs:
  test:
    name: Run Tests and Linters
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@f94ec0be8614c2427bdd53d712ce52dc684aa595  # v5.2.2
        with:
          version: "0.5.21"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version-file: "netmiko_mcp/.python-version"

      - name: Install dependencies
        working-directory: ./netmiko_mcp
        run: |
          uv sync --frozen

      - name: Run ruff format
        working-directory: ./netmiko_mcp
        run: |
          uv run --frozen ruff format --check .

      - name: Run ruff check
        working-directory: ./netmiko_mcp
        run: |
          uv run --frozen ruff check .

      - name: Run mypy
        working-directory: ./netmiko_mcp
        run: |
          uv run --frozen mypy src tests

      - name: Run pytest (Unit Tests Only)
        working-directory: ./netmiko_mcp
        run: |
          # We purposefully omit RUN_LIVE_TESTS=1 so the live integration test skips cleanly
          uv run --frozen pytest -v
